<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gramo — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #171717;
    --border: #2a2a2a;
    --accent: #c8a97e;
    --accent2: #e8c99e;
    --text: #f0ece4;
    --muted: #7a7570;
    --danger: #c0604a;
    --radius: 4px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 60% 20%, rgba(200,169,126,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 20% 80%, rgba(200,169,126,0.04) 0%, transparent 50%);
    pointer-events: none;
  }
  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-style: italic;
    color: var(--accent);
    letter-spacing: -1px;
    text-align: center;
    margin-bottom: 2rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2.5rem 2.5rem;
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
  }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 0;
    cursor: pointer;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .form { display: flex; flex-direction: column; gap: 1rem; }
  .form.hidden { display: none; }
  label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 0.3rem;
  }
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
  }
  .btn {
    background: var(--accent);
    color: #1a1410;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.8rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .error {
    background: rgba(192,96,74,0.12);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    color: var(--danger);
    font-size: 0.85rem;
    padding: 0.6rem 0.8rem;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="wordmark">Gramo</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <!-- LOGIN -->
  <form class="form" id="loginForm" onsubmit="doLogin(event)">
    <div>
      <label>Username or Email</label>
      <input type="text" id="loginField" required autocomplete="username"/>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="loginPass" required autocomplete="current-password"/>
    </div>
    <div id="loginError" class="error"></div>
    <button class="btn" type="submit">Sign In</button>
  </form>

  <!-- REGISTER -->
  <form class="form hidden" id="registerForm" onsubmit="doRegister(event)">
    <div>
      <label>Full Name</label>
      <input type="text" id="regName" required/>
    </div>
    <div>
      <label>Username</label>
      <input type="text" id="regUsername" required/>
    </div>
    <div>
      <label>Email</label>
      <input type="email" id="regEmail" required/>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="regPassword" required/>
    </div>
    <label class="checkbox-row">
      <input type="checkbox" id="regPrivate"/>
      Private account
    </label>
    <div id="registerError" class="error"></div>
    <button class="btn" type="submit">Create Account</button>
  </form>
</div>

<script>
  const API_USER = 'http://localhost:5000';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
  }

  async function doLogin(e) {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');
    try {
      const res = await fetch(`${API_USER}/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ login: document.getElementById('loginField').value, password: document.getElementById('loginPass').value })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message; errEl.classList.add('show'); return; }
      localStorage.setItem('token', data.token);
      // Decode user id from token
      const payload = JSON.parse(atob(data.token.split('.')[1]));
      localStorage.setItem('user_id', payload.id);
      window.location.href = 'feed.html';
    } catch(err) {
      errEl.textContent = 'Connection error'; errEl.classList.add('show');
    }
  }

  async function doRegister(e) {
    e.preventDefault();
    const errEl = document.getElementById('registerError');
    errEl.classList.remove('show');
    try {
      const res = await fetch(`${API_USER}/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          name: document.getElementById('regName').value,
          username: document.getElementById('regUsername').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          is_private: document.getElementById('regPrivate').checked
        })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message; errEl.classList.add('show'); return; }
      switchTab('login');
    } catch(err) {
      errEl.textContent = 'Connection error'; errEl.classList.add('show');
    }
  }

  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = 'feed.html';
</script>
</body>
</html>
